---
# https://github.com/autopkg/jgstew-recipes/tree/main/SharedProcessors/FileYamlReadYq.py
# NOTE: requires the `yq` binary (Mike Farah's yq): brew / choco / snap install yq
Description: Test FileYamlReadYq Processor
Identifier: com.github.jgstew.test.FileYamlReadYq
Input:
  NAME: FileYamlReadYqTest
MinimumVersion: "2.4.1"
Process:
  - Processor: FileCreator
    Arguments:
      file_path: "%RECIPE_CACHE_DIR%/test.yaml"
      file_content: |
        name: Example
        nested:
          host: example.com
          tags:
            - alpha
            - beta

  # query a nested value from the file:
  - Processor: com.github.jgstew.SharedProcessors/FileYamlReadYq
    Arguments:
      yaml_input: "%RECIPE_CACHE_DIR%/test.yaml"
      yq_expression: ".nested.host"

  - Processor: com.github.jgstew.SharedProcessors/AssertInputContainsString
    Arguments:
      input_string: "%yaml_yq_result%"
      assert_string: "example.com"

  # query a list element by index:
  - Processor: com.github.jgstew.SharedProcessors/FileYamlReadYq
    Arguments:
      yaml_input: "%RECIPE_CACHE_DIR%/test.yaml"
      yq_expression: ".nested.tags[1]"

  - Processor: com.github.jgstew.SharedProcessors/AssertInputContainsString
    Arguments:
      input_string: "%yaml_yq_result%"
      assert_string: "beta"
