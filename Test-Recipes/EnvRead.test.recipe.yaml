---
Description: Test EnvRead Processor
Identifier: com.github.jgstew.test.EnvRead
Input:
  NAME: EnvReadTest
MinimumVersion: "2.4.1"
Process:
  - Processor: com.github.jgstew.SharedProcessors/EnvRead
    Arguments:
      env_var_name: "USER"
      output_var_name: "user"

  - Processor: com.github.jgstew.SharedProcessors/EnvRead
    Arguments:
      env_var_name: "HOME"
      output_var_name: "home_path"

  - Processor: com.github.jgstew.SharedProcessors/TextSearcher
    Arguments:
      input_string: "%home_path%"
      re_pattern: '/|\\'
      output_var_name: "path_separator"
