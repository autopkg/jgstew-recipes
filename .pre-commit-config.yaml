---
# run on only items staged in git:  pre-commit
# automatically run on commit:      pre-commit install
# check all files in repo:          pre-commit run --all-files
# check all files + manual checks:  pre-commit run --all-files --hook-stage manual
# update all checks to latest:      pre-commit autoupdate
# https://github.com/pre-commit/pre-commit-hooks
repos:
  - repo: meta
    hooks:
      - id: check-useless-excludes
      - id: check-hooks-apply

  - repo: https://github.com/homebysix/pre-commit-macadmin
    rev: v1.25.0
    hooks:
      - id: check-autopkg-recipe-list
      - id: check-autopkg-recipes
        args: ["--recipe-prefix=com.github.jgstew.", "--override-prefix=com.github.jgstew.", "--strict", "--"]
        exclude: ".*.test.recipe.yaml"
      # - id: forbid-autopkg-overrides

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      # check-json doesn't work with json with comments
      # - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-ast
      - id: check-case-conflict
      - id: check-merge-conflict
      # - id: check-xml
      - id: end-of-file-fixer
        exclude: "\\.templates/\\.partials/.*"
      # https://www.aleksandrhovhannisyan.com/blog/crlf-vs-lf-normalizing-line-endings-in-git/
      # - id: mixed-line-ending
      #   args: ['--fix=no']
      - id: requirements-txt-fixer
      - id: trailing-whitespace
      #  args: [--markdown-linebreak-ext=md]
      - id: detect-private-key
      # - id: no-commit-to-branch
      #   args: [--branch, main]

  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: [-c=.yamllint.yaml]

  - repo: https://github.com/PyCQA/isort
    rev: 9.0.0a3
    hooks:
      - id: isort

  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.37.4
    hooks:
      # - id: check-jsonschema
      #   files: \.recipe\.yaml$
      #   stages: [manual]
      #   args:
      #     [
      #       "--schemafile",
      #       "https://raw.githubusercontent.com/jgstew/jgstew-recipes/main/.AutoPkgRecipeOpinionated.schema.json",
      #     ]
      - id: check-metaschema
        files: \.schema\.json$
        args: ["--verbose"]
      - id: check-github-workflows
        args: ["--verbose"]
      - id: check-dependabot
      - id: check-github-actions
      - id: check-jsonschema
        name: check-jsonschema local file
        files: \.recipe\.yaml$
        args: ["--schemafile", ".AutoPkgRecipeOpinionated.schema.json"]

  - repo: https://github.com/psf/black-pre-commit-mirror
    rev: 26.5.1
    hooks:
      - id: black

  # - repo: https://github.com/asottile/pyupgrade
  #   rev: v3.19.1
  #   hooks:
  #     - id: pyupgrade
  #       name: Upgrade Python syntax
  #       args: [--py310-plus]

  - repo: https://github.com/adamchainz/blacken-docs
    rev: "1.20.0"
    hooks:
      - id: blacken-docs
        additional_dependencies:
          - black>=22.12.0

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        # args: ["--ignore-words-list=autopkg,AutoPkg,AutoPkgRecipe,AutoPkgRecipes,AutoPkgRecipeList,AutoPkgRecipeLists"]

  - repo: https://github.com/jgstew/pre-commit-jgstew
    rev: v1.3.2
    hooks:
      - id: verify-files-are-ascii
        exclude: "Firefox-Win.ChocolateyTemplate.Firefox.nuspec$"
      - id: validate-bes
      - id: validate-plist
      - id: add-missing-docstrings
      # - id: github-action-set-output-fix
      # https://github.com/jgstew/pre-commit-jgstew/blob/main/pre_commit_hooks/regex_search_filter_replace.py
      # normalize the "# Created <year> by <author>" header to the canonical author name.
      # NOTE: files override is required -- this hook defaults to xml/html/bes only.
      # - id: regex-search-filter-replace
      #   name: Normalize "Created by" author name to JGStew.
      #   files: ^Shared(Dangerous)?Processors/.*\.py$
      #   args:
      #     # non-capturing groups so re.findall returns the whole match, not just
      #     # the name (else filetext.replace would swap every jgstew in the file)
      #     - '--search=# Created \d{4} by (?:JGSTEW|jgstew)'
      #     - '--filter=(?:JGSTEW|jgstew)'
      #     - '--replace=JGStew'
      #     - '--overwrite'
      - id: regex-search-filter-replace
        name: Normalize URLDownloaderPython to JGStew's version.
        files: \.(ya?ml)$
        exclude: ^(Test-Recipes/URLDownloaderPythonCore.test.recipe.yaml|.pre-commit-config.yaml)$|.github
        args:
          # The hook's final step is an UNANCHORED filetext.replace(match, ...), so a
          # zero-width \b is not enough -- the match string must itself include a real
          # boundary char (the trailing newline) or "URLDownloaderPythonCore" would be
          # corrupted by the literal replace. No capturing groups, so re.findall
          # returns the full match string.
          - '--search= Processor: URLDownloaderPython\n'
          - '--filter= URLDownloaderPython'
          - '--replace= com.github.jgstew.SharedProcessors/URLDownloaderPython'
          - '--overwrite'

  - repo: local
    hooks:
      - id: check-processor-conventions
        name: Check AutoPkg processor conventions
        description: Picky, opinionated checks for AutoPkg processor boilerplate and conventions.
        language: script
        entry: ./autopkg_processor_check_conventions.py
        # auto-fixes fixable issues (currently E001 shebang); use --auto-fix=no to only report
        args: ["--auto-fix=yes"]
        files: ^Shared(Dangerous)?Processors/.*\.py$
