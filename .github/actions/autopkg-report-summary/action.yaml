name: "autopkg-report-summary"
description: "Parse an AutoPkg --report-plist and write a pass/fail summary to the GitHub Actions job summary; fails if any recipe failed. Optionally scans the run log for 'Use of undefined key in variable substitution' warnings."
inputs:
  report-plist:
    description: "Path to the AutoPkg report plist."
    required: true
  recipe-list:
    description: "Path to the recipe-list file (used to count how many ran)."
    required: true
  title:
    description: "Heading for the summary."
    required: false
    default: "AutoPkg Test Results"
  item-label:
    description: "Table column header for the item, e.g. Recipe. The count noun is its lowercase form."
    required: false
    default: "Recipe"
  run-outcome:
    description: "Outcome of the autopkg run step (steps.<id>.outcome). Used to catch failures that AutoPkg does not record in the report plist, e.g. an unresolvable recipe in the list ('No valid recipe found', exit 70)."
    required: false
    default: ""
  run-exit-code:
    description: "Numeric exit code of the autopkg run step (steps.<id>.outputs.exit-code). Reported in the summary and preferred over run-outcome for detecting failure."
    required: false
    default: ""
  run-log:
    description: "Path to the captured autopkg run log (stdout+stderr). Scanned for AutoPkg's non-fatal 'Use of undefined key in variable substitution' warnings, which are logged to stderr and not recorded in the report plist. Optional; the scan is skipped if unset or missing."
    required: false
    default: ""
runs:
  using: "composite"
  steps:
    - name: Summarize failures
      shell: bash
      env:
        REPORT_PLIST: ${{ inputs.report-plist }}
        RECIPE_LIST: ${{ inputs.recipe-list }}
        SUMMARY_TITLE: ${{ inputs.title }}
        ITEM_LABEL: ${{ inputs.item-label }}
        RUN_OUTCOME: ${{ inputs.run-outcome }}
        RUN_EXIT_CODE: ${{ inputs.run-exit-code }}
        RUN_LOG: ${{ inputs.run-log }}
      run: |
          python3 - <<'PYEOF'
          import os
          import plistlib

          # emoji via \u escapes so this workflow file stays pure ASCII:
          ICON_FAIL = "\u274c"  # cross mark
          ICON_PASS = "\u2705"  # check mark
          ICON_WARN = "\u26a0\ufe0f"  # warning sign

          def md_table(header, rows):
              """Render a Markdown table from a header list and dict data_rows."""
              out = ["| " + " | ".join(str(h).replace("_", " ").title() for h in header) + " |"]
              out.append("| " + " | ".join(["---"] * len(header)) + " |")
              for row in rows:
                  cells = []
                  for field in header:
                      val = row.get(field, "") if isinstance(row, dict) else ""
                      val = " ".join(str(val).split()).replace("|", "\\|")
                      if len(val) > 200:
                          val = val[:197] + "..."
                      cells.append(val)
                  out.append("| " + " | ".join(cells) + " |")
              return out

          report = os.environ["REPORT_PLIST"]
          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          title = os.environ.get("SUMMARY_TITLE", "AutoPkg Test Results")
          label = os.environ.get("ITEM_LABEL", "Recipe")
          noun = label.lower()

          run_outcome = os.environ.get("RUN_OUTCOME", "")
          run_exit_raw = os.environ.get("RUN_EXIT_CODE", "").strip()
          try:
              run_exit_code = int(run_exit_raw) if run_exit_raw else None
          except ValueError:
              run_exit_code = None
          # a note like " (exit code 70)" for the failure headers, when known:
          exit_note = (
              f" (exit code {run_exit_code})"
              if run_exit_code not in (None, 0)
              else ""
          )

          try:
              with open(os.environ["RECIPE_LIST"], encoding="utf-8") as handle:
                  entries = [line.strip() for line in handle if line.strip()]
          except FileNotFoundError:
              entries = []
          total = len(entries)

          # Recipes listed but no longer present on disk (e.g. renamed/deleted in
          # this commit but still reported as "changed"). AutoPkg cannot resolve
          # these, prints "No valid recipe found", and exits 70 -- but records
          # nothing in the report plist, so they must be caught here.
          missing = [
              entry
              for entry in entries
              if ("/" in entry or entry.endswith((".recipe.yaml", ".recipe")))
              and not os.path.isfile(entry)
          ]

          failures = []
          summary_results = {}
          report_exists = os.path.isfile(report)
          if report_exists:
              with open(report, "rb") as handle:
                  rep = plistlib.load(handle)
              failures = rep.get("failures", []) or []
              summary_results = rep.get("summary_results", {}) or {}

          # AutoPkg logs "Use of undefined key in variable substitution: 'key'" to
          # stderr (non-fatal) when a recipe references a %variable% that is not
          # defined -- a typo, or a missing Input/output. It is NOT written to the
          # report plist, so scan the captured run log for it. Counted per key.
          UNDEF_MARKER = "Use of undefined key in variable substitution:"
          undefined_keys = {}
          processed_count = 0
          scanned_log = False
          run_log = os.environ.get("RUN_LOG", "")
          if run_log and os.path.isfile(run_log):
              scanned_log = True
              with open(run_log, encoding="utf-8", errors="replace") as handle:
                  for line in handle:
                      stripped = line.strip()
                      if stripped.startswith("Processing ") and stripped.endswith("..."):
                          processed_count += 1
                      pos = line.find(UNDEF_MARKER)
                      if pos == -1:
                          continue
                      detail = line[pos + len(UNDEF_MARKER):].strip()
                      key = detail.strip().strip("'\"") or detail
                      undefined_keys[key] = undefined_keys.get(key, 0) + 1

          lines = [f"# {title}", "", f"Ran **{total}** {noun}(s).", ""]

          # A non-zero run with no recorded failures/missing recipes still needs
          # to be surfaced (e.g. an unresolvable recipe or a crash before the
          # report was written) rather than shown as a pass. Prefer the numeric
          # exit code when available; otherwise fall back to the outcome string.
          if run_exit_code is not None:
              run_failed = run_exit_code != 0
          else:
              run_failed = run_outcome not in ("", "success", "skipped")
          run_failed_unexplained = run_failed and not failures and not missing

          if failures:
              lines.append(f"## {ICON_FAIL} {len(failures)} of {total} failed{exit_note}")
              lines.append("")
              lines.append(f"| {label} | Error |")
              lines.append("| --- | --- |")
              for item in failures:
                  recipe = str(item.get("recipe", "?"))
                  if recipe.startswith("./"):
                      recipe = recipe[2:]
                  message = " ".join(str(item.get("message", "")).split())
                  if len(message) > 300:
                      message = message[:297] + "..."
                  recipe = recipe.replace("|", "\\|")
                  message = message.replace("|", "\\|")
                  lines.append(f"| `{recipe}` | {message} |")
          elif missing:
              lines.append(
                  f"## {ICON_FAIL} {len(missing)} {noun}(s) could not be found{exit_note}"
              )
          elif run_failed_unexplained:
              if run_exit_code not in (None, 0):
                  detail = f"exit code {run_exit_code}"
              else:
                  detail = f"outcome: {run_outcome}"
              lines.append(
                  f"## {ICON_FAIL} The run failed ({detail}) "
                  "with no per-recipe failure recorded in the report"
              )
              lines.append("")
              lines.append(
                  "AutoPkg exited non-zero for a reason it did not write to the "
                  "report plist (e.g. an unresolvable recipe or a crash). Check "
                  "the run step log."
              )
          elif report_exists:
              lines.append(f"## {ICON_PASS} All {total} {noun}(s) passed")
          else:
              lines.append(
                  f"## {ICON_WARN} No report produced "
                  "(the run may have crashed before writing it)"
              )

          # list unresolvable recipes (shown in addition to any failures above):
          if missing:
              lines.append("")
              lines.append(
                  f"These {noun}(s) were in the list but not found on disk "
                  "(renamed or deleted?) -- AutoPkg exits 70 on an unresolvable "
                  f"{noun}:"
              )
              lines.append("")
              for entry in missing:
                  lines.append(f"- `{entry}`")

          # deprecations AutoPkg recorded for the installed version (non-fatal):
          dep = summary_results.get("deprecation_summary_result")
          if isinstance(dep, dict) and dep.get("data_rows"):
              dep_rows = dep["data_rows"]
              dep_header = dep.get("header") or ["name", "warning"]
              lines.append("")
              lines.append(f"## {ICON_WARN} {len(dep_rows)} deprecation warning(s)")
              lines.append("")
              lines += md_table(dep_header, dep_rows)

          # undefined-variable warnings (non-fatal; surfaced, does not fail the job):
          if undefined_keys:
              total_undef = sum(undefined_keys.values())
              lines.append("")
              lines.append(
                  f"## {ICON_WARN} {total_undef} undefined-variable warning(s)"
              )
              lines.append("")
              lines.append(
                  'AutoPkg logged "Use of undefined key in variable substitution" '
                  "-- usually a typo'd `%variable%` or a missing Input/output. "
                  "Non-fatal, but often a real bug."
              )
              lines.append("")
              lines.append("| Undefined key | Occurrences |")
              lines.append("| --- | --- |")
              for key in sorted(undefined_keys):
                  safe = key.replace("|", "\\|")
                  lines.append(f"| `{safe}` | {undefined_keys[key]} |")

          # processed-recipe sanity from the run log (informational):
          if scanned_log:
              lines.append("")
              if processed_count < total:
                  lines.append(
                      f"{ICON_WARN} Processed **{processed_count}** of **{total}** "
                      f"listed {noun}(s) -- some were not processed (skipped, "
                      "unresolvable, or the run stopped early)."
                  )
              else:
                  lines.append(
                      f"Processed **{processed_count}** of **{total}** listed "
                      f"{noun}(s)."
                  )

          # AutoPkg summary_results (downloads, versions, pkgs, imports) as tables,
          # each collapsible to keep the monthly all-recipes summary manageable:
          info_results = {
              k: v
              for k, v in summary_results.items()
              if k != "deprecation_summary_result"
          }
          if info_results:
              lines.append("")
              lines.append("## Summary results")
              for key in sorted(info_results):
                  entry = info_results[key]
                  header = entry.get("header") or []
                  rows = entry.get("data_rows") or []
                  if not header or not rows:
                      continue
                  text = entry.get("summary_text") or key
                  lines.append("")
                  lines.append("<details>")
                  lines.append(f"<summary>{text} ({len(rows)})</summary>")
                  lines.append("")
                  lines += md_table(header, rows)
                  lines.append("")
                  lines.append("</details>")

          summary = "\n".join(lines) + "\n"
          if summary_path:
              with open(summary_path, "a", encoding="utf-8") as handle:
                  handle.write(summary)
          print(summary)

          # fail the job if any recipe failed, a listed recipe was unresolvable,
          # or the run failed for a reason not captured in the report (covers the
          # case where autopkg exits 0 despite failures, and the inverse where it
          # exits non-zero without recording anything):
          if failures or missing or run_failed_unexplained:
              raise SystemExit(1)
          PYEOF
